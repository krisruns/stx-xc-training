<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STX XC 2026 — Season Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #B8960C;
  --green: #1A3A2A;
  --green-mid: #2D5C3F;
  --green-light: #E6F0EA;
  --white: #FDFCF8;
  --gray-50:  #FAF9F5;
  --gray-100: #F5F3EE;
  --gray-200: #E8E4D8;
  --gray-400: #A09880;
  --gray-600: #6B6354;
  --gray-900: #1C1A14;
  --c-race-bg:#D1FAE5;  --c-race-fg:#065F46;
  --c-prac-bg:#DCFCE7;  --c-prac-fg:#14532D;
  --c-serv-bg:#FEF3C7;  --c-serv-fg:#92400E;
  --c-team-bg:#DBEAFE;  --c-team-fg:#1E3A8A;
  --c-post-bg:#EDE9FE;  --c-post-fg:#4C1D95;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--gray-900);font-size:15px;line-height:1.6;min-height:100vh;}

/* HEADER */
header{background:var(--green);border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:100;}
.header-inner{max-width:980px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo{display:flex;align-items:center;gap:11px;}
.logo-mark{width:38px;height:38px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--green);flex-shrink:0;line-height:1.2;text-align:center;}
.logo-text h1{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.2px;}
.logo-text p{font-size:10px;color:rgba(255,255,255,.45);font-family:'DM Mono',monospace;letter-spacing:.07em;}
.header-actions{display:flex;align-items:center;gap:8px;}
.last-updated{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.05em;}
.view-toggle{display:flex;background:rgba(255,255,255,.12);border-radius:8px;padding:3px;gap:2px;}
.view-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;border:none;background:transparent;color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s;white-space:nowrap;}
.view-btn.active{background:rgba(255,255,255,.2);color:#fff;}
.view-btn:hover:not(.active){color:rgba(255,255,255,.85);}
.print-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 13px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.65);cursor:pointer;transition:all .15s;}
.print-btn:hover{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.4);}

/* STATS */
.stats-bar{background:var(--gray-100);border-bottom:1px solid var(--gray-200);}
.stats-bar-inner{max-width:980px;margin:0 auto;padding:10px 24px;display:flex;}
.stat{flex:1;text-align:center;padding:0 8px;border-right:1px solid var(--gray-200);}
.stat:last-child{border-right:none;}
.stat-num{font-size:20px;font-weight:600;color:var(--green);font-family:'DM Mono',monospace;line-height:1;}
.stat-label{font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}

/* CONTROLS */
.controls{max-width:980px;margin:0 auto;padding:16px 24px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.controls-label{font-size:11px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;margin-right:2px;}
.filter-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:5px 13px;border-radius:99px;border:1px solid var(--gray-200);background:var(--white);color:var(--gray-600);cursor:pointer;transition:all .15s;}
.filter-btn:hover{border-color:var(--gray-400);color:var(--gray-900);}
.filter-btn.active{background:var(--green);color:#fff;border-color:var(--green);}
.search-wrap{margin-left:auto;}
.search-wrap input{font-family:'DM Sans',sans-serif;font-size:13px;padding:5px 12px;border:1px solid var(--gray-200);border-radius:8px;background:var(--white);color:var(--gray-900);width:180px;outline:none;transition:border-color .15s;}
.search-wrap input:focus{border-color:var(--green-mid);}
.search-wrap input::placeholder{color:var(--gray-400);}

/* MAIN */
main{max-width:980px;margin:0 auto;padding:20px 24px 60px;}

/* LIST VIEW */
.month-section{margin-bottom:28px;}
.month-heading{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-400);padding-bottom:8px;border-bottom:1.5px solid var(--gray-200);margin-bottom:4px;}
.event-row{display:grid;grid-template-columns:72px 1fr 190px 88px;gap:0 14px;align-items:center;padding:10px 10px;border-radius:8px;transition:background .1s;}
.event-row:hover{background:var(--gray-100);}
.event-date{text-align:right;}
.event-date .weekday{font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.07em;}
.event-date .date{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;}
.event-name{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.event-desc{font-size:12px;color:var(--gray-400);margin-top:1px;}
.event-location{font-size:12px;color:var(--gray-600);line-height:1.4;}
.event-time{font-size:12px;color:var(--gray-400);font-family:'DM Mono',monospace;text-align:right;white-space:nowrap;}

/* BADGES */
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;letter-spacing:.03em;white-space:nowrap;flex-shrink:0;}
.badge-race{background:var(--c-race-bg);color:var(--c-race-fg);}
.badge-practice{background:var(--c-prac-bg);color:var(--c-prac-fg);}
.badge-service{background:var(--c-serv-bg);color:var(--c-serv-fg);}
.badge-team{background:var(--c-team-bg);color:var(--c-team-fg);}
.badge-post{background:var(--c-post-bg);color:var(--c-post-fg);}
.badge-default{background:var(--gray-100);color:var(--gray-600);}
.act-dot{display:inline-block;width:7px;height:7px;background:#EF4444;border-radius:50%;margin-left:3px;vertical-align:middle;flex-shrink:0;}

/* CALENDAR VIEW */
#cal-view{display:none;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-nav-btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:6px 14px;border-radius:8px;border:1px solid var(--gray-200);background:var(--white);color:var(--gray-600);cursor:pointer;transition:all .15s;}
.cal-nav-btn:hover{background:var(--gray-100);border-color:var(--gray-400);}
.cal-month-label{font-size:17px;font-weight:600;color:var(--gray-900);}
.cal-grid{border:1px solid var(--gray-200);border-radius:12px;overflow:hidden;margin-bottom:28px;}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--gray-100);border-bottom:1px solid var(--gray-200);}
.cal-dow{text-align:center;padding:8px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);}
.cal-days-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-day{border-right:1px solid var(--gray-200);border-bottom:1px solid var(--gray-200);min-height:100px;padding:6px;background:var(--white);}
.cal-day:nth-child(7n){border-right:none;}
.cal-day.other-month{background:var(--gray-50);}
.cal-day.today{background:#F0FDF4;}
.cal-day-num{font-size:12px;font-weight:500;color:var(--gray-400);margin-bottom:4px;font-family:'DM Mono',monospace;line-height:1;}
.cal-day.today .cal-day-num{background:var(--green);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;}
.cal-day.other-month .cal-day-num{color:var(--gray-200);}
.cal-chip{font-size:10px;font-weight:500;padding:2px 5px;border-radius:4px;margin-bottom:3px;display:block;white-space:normal;word-wrap:break-word;line-height:1.4;}
.cal-chip-race{background:var(--c-race-bg);color:var(--c-race-fg);}
.cal-chip-practice{background:var(--c-prac-bg);color:var(--c-prac-fg);}
.cal-chip-service{background:var(--c-serv-bg);color:var(--c-serv-fg);}
.cal-chip-team{background:var(--c-team-bg);color:var(--c-team-fg);}
.cal-chip-post{background:var(--c-post-bg);color:var(--c-post-fg);}
.cal-chip-default{background:var(--gray-100);color:var(--gray-600);}
.cal-more{font-size:10px;color:var(--gray-400);padding:1px 4px;display:block;}

/* STATE BOXES */
.state-box{text-align:center;padding:60px 24px;color:var(--gray-400);}
.state-box .icon{font-size:32px;margin-bottom:12px;}
.state-box h3{font-size:16px;font-weight:500;color:var(--gray-600);margin-bottom:6px;}
.state-box p{font-size:13px;max-width:380px;margin:0 auto;line-height:1.6;}
.config-banner{background:#FFF7ED;border:1px solid #FED7AA;border-radius:10px;padding:16px 20px;margin-bottom:24px;font-size:13px;color:#7C2D12;}
.config-banner strong{font-weight:600;}
.config-banner ol{margin:10px 0 0 18px;line-height:2.3;}
.config-banner code{background:rgba(0,0,0,.06);padding:1px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;}
.config-banner a{color:#9A3412;}

/* FOOTER */
footer{border-top:1px solid var(--gray-200);padding:20px 24px;text-align:center;font-size:11px;color:var(--gray-400);font-family:'DM Mono',monospace;letter-spacing:.04em;}

/* RESPONSIVE */
@media(max-width:680px){
  .event-row{grid-template-columns:58px 1fr;}
  .event-location,.event-time{display:none;}
  .stats-bar-inner{flex-wrap:wrap;}
  .stat{min-width:50%;border-right:none;border-bottom:1px solid var(--gray-200);}
  .stat:nth-child(3),.stat:nth-child(4){border-bottom:none;}
  .last-updated,.print-btn{display:none;}
  .search-wrap input{width:130px;}
  .cal-day{min-height:72px;}
}

/* PRINT */
@media print{
  @page{margin:.75in;size:letter portrait;}
  header{position:static!important;background:var(--green)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .header-actions{display:none!important;}
  .stats-bar{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .controls{display:none!important;}
  #cal-view.print-hide  { display: none !important; }
  #list-view.print-hide { display: none !important; }
  body{font-size:12px;}
  main{padding:14px 0 0;}
  footer{display:none;}
  .event-row{grid-template-columns:66px 1fr 155px 78px;padding:7px 4px;break-inside:avoid;}
  .event-row:hover{background:none;}
  .month-section{break-inside:avoid;margin-bottom:18px;}
  .badge{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">STX<br>XC</div>
      <div class="logo-text">
        <h1>Cross Country 2026</h1>
        <p>ST. XAVIER HIGH SCHOOL</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="view-toggle">
        <button class="view-btn active" id="btn-list" onclick="setView('list')">☰ List</button>
        <button class="view-btn"        id="btn-cal"  onclick="setView('cal')">▦ Calendar</button>
      </div>
      <button class="print-btn" onclick="printCurrent()">⎙ Print / PDF</button>
      <div class="last-updated" id="last-updated"></div>
    </div>
  </div>
</header>

<div class="stats-bar">
  <div class="stats-bar-inner">
    <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total events</div></div>
    <div class="stat"><div class="stat-num" id="stat-races">—</div><div class="stat-label">Races</div></div>
    <div class="stat"><div class="stat-num" id="stat-service">—</div><div class="stat-label">Service</div></div>
    <div class="stat"><div class="stat-num" id="stat-postseason">—</div><div class="stat-label">Post-season</div></div>
  </div>
</div>

<div class="controls">
  <span class="controls-label">Filter</span>
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="race">Races</button>
  <button class="filter-btn" data-cat="practice">Practice</button>
  <button class="filter-btn" data-cat="service">Service</button>
  <button class="filter-btn" data-cat="team">Team events</button>
  <button class="filter-btn" data-cat="post">Post-season</button>
  <div class="search-wrap">
    <input type="search" id="search" placeholder="Search events…">
  </div>
</div>

<main>
  <div id="list-view">
    <div class="state-box"><div class="icon">⏳</div><h3>Loading schedule…</h3><p>Fetching events from Google Calendar.</p></div>
  </div>
  <div id="cal-view">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calShift(-1)">← Prev</button>
      <div class="cal-month-label" id="cal-month-label"></div>
      <button class="cal-nav-btn" onclick="calShift(1)">Next →</button>
    </div>
    <div id="cal-grid-wrap"></div>
  </div>
</main>

<footer>STX XC · Updated live from Google Calendar · <span id="footer-year"></span></footer>

<script>
// ── CONFIGURATION ──────────────────────────────
const CALENDAR_ID = 'sp6ujpuiq5hikjaa8qnht061a4@group.calendar.google.com';
const API_KEY     = 'AIzaSyAN4QFzfhhTb3B2mxh54P65in_AO7WUFMM';
// ───────────────────────────────────────────────

document.getElementById('footer-year').textContent = new Date().getFullYear();

const MONTHS_LONG  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_SHORT  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']; // indexed by getDay()
const DAYS_CAL    = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']; // Mon-first for calendar header

const COLOR_MAP = { '10':'race', '2':'practice', '5':'service', '7':'team', '3':'post' };
const CAT_LABELS = { race:'Race', practice:'Practice', service:'Service', team:'Team event', post:'Post-season' };

function categorizeByKeyword(name, desc) {
  const t = (name + ' ' + (desc||'')).toLowerCase();

  // Explicit [Tag] flags take priority
  if (t.includes('[race]'))     return 'race';
  if (t.includes('[practice]')) return 'practice';
  if (t.includes('[service]'))  return 'service';
  if (t.includes('[post]'))     return 'post';
  if (t.includes('[team]'))     return 'team';

  // Keyword fallback
  if (/regional|foot locker|nike team|runninglane/.test(t))        return 'post';
  if (/soup kitchen|direct service|indirect service|carnival|picnic|hustle/.test(t)) return 'service';
  if (/practice|workout|pm practice|camp x/.test(t))               return 'practice';
  if (/classic|invitational|showcase|championship|champions series|dual|time trial|meet of champions|tiger run/.test(t)) return 'race';
  return 'team';
}

// Use colorId when set by Apps Script, otherwise fall back to keyword matching
function categorize(ev) {
  if (ev.colorId && COLOR_MAP[ev.colorId]) return COLOR_MAP[ev.colorId];
  return categorizeByKeyword(ev.summary, ev.description);
}
function badgeHTML(cat)  { return `<span class="badge badge-${cat}">${CAT_LABELS[cat]||'Event'}</span>`; }
function parseStart(ev)  { return ev.start.dateTime ? new Date(ev.start.dateTime) : new Date(ev.start.date+'T00:00:00'); }
function isACT(ev)       { return /ACT/i.test(ev.summary+(ev.description||'')); }

function formatTime(ev) {
  if (ev.start.date) return '<span style="font-style:italic;font-family:\'DM Sans\',sans-serif">All day</span>';
  const d = new Date(ev.start.dateTime);
  let h = d.getHours(), m = d.getMinutes(), ap = h>=12?'PM':'AM';
  h = h%12||12;
  return `${h}${m?':'+String(m).padStart(2,'0'):''}\u202f${ap}`;
}

let allEvents    = [];
let activeFilter = 'all';
let searchQuery  = '';
let currentView  = 'list';
let calYear, calMonth;

// ── VIEW TOGGLE ────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('list-view').style.display = v==='list' ? '' : 'none';
  document.getElementById('cal-view').style.display  = v==='cal'  ? 'block' : 'none';
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  document.getElementById('btn-cal').classList.toggle('active',  v==='cal');
  if (v==='cal') {
    // Ensure calYear/calMonth are always set before rendering
    if (calYear === undefined || calMonth === undefined) {
      const seed = allEvents.length ? parseStart(allEvents[0]) : new Date();
      calYear = seed.getFullYear();
      calMonth = seed.getMonth();
    }
    renderCalendar();
  }
}
function printCurrent() {
  document.getElementById('list-view').classList.toggle('print-hide', currentView !== 'list');
  document.getElementById('cal-view').classList.toggle('print-hide',  currentView !== 'cal');
  window.print();
}
// ── FILTERED EVENTS ────────────────────────────
function getFiltered() {
  return allEvents.filter(ev => {
    const cat = categorize(ev);
    const ok1 = activeFilter==='all' || cat===activeFilter;
    const ok2 = !searchQuery || (ev.summary+(ev.location||'')+(ev.description||'')).toLowerCase().includes(searchQuery);
    return ok1 && ok2;
  });
}

// ── LIST RENDER ────────────────────────────────
function renderList() {
  const events = getFiltered();
  const el = document.getElementById('list-view');
  if (!events.length) {
    el.innerHTML = `<div class="state-box"><div class="icon">🔍</div><h3>No events found</h3><p>Try a different filter or search term.</p></div>`;
    return;
  }
  const byMonth = {};
  events.forEach(ev => {
    const d = parseStart(ev);
    const k = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
    (byMonth[k]=byMonth[k]||[]).push(ev);
  });
  let html = '';
  for (const k of Object.keys(byMonth).sort()) {
    const [yr,mo] = k.split('-');
    html += `<div class="month-section"><div class="month-heading">${MONTHS_LONG[+mo]} ${yr}</div>`;
    for (const ev of byMonth[k]) {
      const d   = parseStart(ev);
      const cat = categorize(ev);
      const loc = ev.location ? ev.location.split(',').slice(0,2).join(',') : '—';
      const act = isACT(ev) ? '<span class="act-dot" title="ACT Test Date — plan ahead"></span>' : '';
      const desc = ev.description ? ev.description.replace(/<[^>]+>/g,'').replace(/\[.*?\]/g,'').trim().slice(0,90) : '';
      html += `
        <div class="event-row">
          <div class="event-date">
            <div class="weekday">${DAYS_SHORT[d.getDay()]}</div>
            <div class="date">${MONTHS_SHORT[d.getMonth()]} ${d.getDate()}</div>
          </div>
          <div class="event-main">
            <div class="event-name">${ev.summary}${act}${badgeHTML(cat)}</div>
            ${desc ? `<div class="event-desc">${desc}</div>` : ''}
          </div>
          <div class="event-location">${loc}</div>
          <div class="event-time">${formatTime(ev)}</div>
        </div>`;
    }
    html += `</div>`;
  }
  el.innerHTML = html;
}

// ── CALENDAR RENDER ────────────────────────────
function calShift(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth=0;  calYear++; }
  if (calMonth < 0)  { calMonth=11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${MONTHS_LONG[calMonth]} ${calYear}`;

  // Build day → events map using consistent YYYY-M-D key
  const byDay = {};
  getFiltered().forEach(ev => {
    const d   = parseStart(ev);
    if (d.getFullYear() !== calYear || d.getMonth() !== calMonth) return;
    const key = d.getDate();
    (byDay[key]=byDay[key]||[]).push(ev);
  });

  const firstDow = (new Date(calYear, calMonth, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevTotal   = new Date(calYear, calMonth, 0).getDate();
  const today       = new Date();

  let html = `<div class="cal-grid">
    <div class="cal-dow-row">${DAYS_CAL.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>
    <div class="cal-days-grid">`;

  // Prev month padding
  for (let i=firstDow-1; i>=0; i--)
    html += `<div class="cal-day other-month"><div class="cal-day-num">${prevTotal-i}</div></div>`;

  // Current month
  for (let d=1; d<=daysInMonth; d++) {
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
    const evs = byDay[d] || [];
    const numShow = 3;
    html += `<div class="cal-day${isToday?' today':''}">`;
    html += isToday
      ? `<div class="cal-day-num">${d}</div>`
      : `<div class="cal-day-num">${d}</div>`;
    evs.slice(0,numShow).forEach(ev => {
      const cat = categorize(ev);
      const tpfx = ev.start.dateTime ? (()=>{
        const dt=new Date(ev.start.dateTime); let h=dt.getHours(),ap=h>=12?'p':'a'; h=h%12||12; return `${h}${ap} `;
      })() : '';
      html += `<span class="cal-chip cal-chip-${cat}" title="${ev.summary}${ev.location?' · '+ev.location:''}">${tpfx}${ev.summary}</span>`;
    });
    if (evs.length > numShow) html += `<span class="cal-more">+${evs.length-numShow} more</span>`;
    html += `</div>`;
  }

  // Next month padding
  const remainder = (firstDow + daysInMonth) % 7;
  if (remainder) for (let d=1; d<=7-remainder; d++)
    html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;

  html += `</div></div>`;
  document.getElementById('cal-grid-wrap').innerHTML = html;
}

// ── STATS ──────────────────────────────────────
function updateStats() {
  const c = {race:0,practice:0,service:0,post:0};
  allEvents.forEach(ev => { const k=categorize(ev); if(k in c) c[k]++; });
  document.getElementById('stat-total').textContent      = allEvents.length;
  document.getElementById('stat-races').textContent      = c.race;
  document.getElementById('stat-service').textContent    = c.service;
  document.getElementById('stat-postseason').textContent = c.post;
  document.getElementById('last-updated').textContent    =
    'Updated '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

// ── FETCH ──────────────────────────────────────
async function fetchEvents() {
  if (CALENDAR_ID.startsWith('YOUR_') || API_KEY.startsWith('YOUR_')) {
    document.getElementById('list-view').innerHTML = `
      <div class="config-banner">
        <strong>Setup required — 3 quick steps:</strong>
        <ol>
          <li><strong>Make calendar public:</strong> Google Calendar → Settings → STX XC calendar → Access permissions → "Make available to public"</li>
          <li><strong>Get a free API key:</strong> <a href="https://console.cloud.google.com/" target="_blank">console.cloud.google.com</a> → Enable "Google Calendar API" → Credentials → Create API key → restrict to Calendar API only</li>
          <li><strong>Edit this file:</strong> replace <code>YOUR_CALENDAR_ID</code> and <code>YOUR_GOOGLE_API_KEY</code> at the top of the &lt;script&gt; block, then push to GitHub</li>
        </ol>
      </div>`;
    return;
  }
  const now     = new Date(new Date().getFullYear(),0,1).toISOString();
  const yearEnd = new Date(new Date().getFullYear(),11,31,23,59,59).toISOString();
  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events`
            + `?key=${API_KEY}&timeMin=${now}&timeMax=${yearEnd}&singleEvents=true&orderBy=startTime&maxResults=500`;
  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API error');
    allEvents = data.items || [];
    updateStats();
    // Seed calendar to first month with events
    const seed = allEvents.length ? parseStart(allEvents[0]) : new Date();
    calYear=seed.getFullYear(); calMonth=seed.getMonth();
    renderList();
  } catch(err) {
    document.getElementById('list-view').innerHTML = `
      <div class="state-box"><div class="icon">⚠️</div><h3>Could not load calendar</h3>
      <p>${err.message}</p>
      <p style="margin-top:8px">Ensure the calendar is public and your API key + Calendar ID are correct.</p></div>`;
  }
}

// ── WIRE UP CONTROLS ───────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    renderList();
    if (currentView==='cal') renderCalendar();
  });
});
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderList();
  if (currentView==='cal') renderCalendar();
});

fetchEvents();
</script>
