<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STX XC 2026 — Schedule Viewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f0ed;color:#1a1a1a;min-height:100vh}
header{background:#2c5530;color:#fff;padding:0 16px;display:flex;align-items:center;gap:6px;position:sticky;top:0;z-index:200;height:50px;box-shadow:0 2px 8px rgba(0,0,0,.3);flex-wrap:wrap}
header h1{font-size:14px;font-weight:700;letter-spacing:.03em;white-space:nowrap;margin-right:4px}
.hbtn{height:30px;padding:0 10px;font-size:12px;border:1px solid rgba(255,255,255,.25);border-radius:5px;background:transparent;color:#fff;cursor:pointer;white-space:nowrap;transition:background .15s}
.hbtn:hover{background:rgba(255,255,255,.15)}
.hbtn:disabled{opacity:.35;cursor:default}
.hbtn.on{background:#4a7c59;border-color:#5a9c6a}
select.hsel{height:30px;padding:0 7px;font-size:12px;border:1px solid rgba(255,255,255,.25);border-radius:5px;background:#1e3d22;color:#fff;cursor:pointer}
.wklabel{font-size:13px;font-weight:600;min-width:50px;text-align:center}
.spacer{flex:1}
.hstatus{font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap}
.pipe{color:rgba(255,255,255,.25);font-size:16px;padding:0 2px}
.subbar{height:34px;background:#1e3d22;display:flex;align-items:center;padding:0 16px;gap:6px}
.subbar-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.5);margin-right:4px}

/* week info bar */
.wkbar{background:#fff;border-bottom:2px solid #4a7c59;padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wkbar-title{font-size:14px;font-weight:700;color:#2c5530}
.wkbar-phase{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#666;background:#f0f0ed;padding:2px 8px;border-radius:10px}
.wkbar-note{font-size:12px;color:#555;flex-basis:100%;padding-top:2px;font-style:italic}
.miles-row{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.mbadge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px}
.mb-Gold{background:#FFF3CD;color:#7A5800}
.mb-Green{background:#D4EDDA;color:#155724}
.mb-White{background:#EBEBEB;color:#444}
.mb-Blue{background:#D1E8FF;color:#0C3866}

main{padding:14px 16px;max-width:1500px;margin:0 auto}

/* pane wrapper */
.pane{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.pane-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:6px 12px;border-bottom:1px solid #eee}
.lbl-md{background:#f0f5f0;color:#2c5530;border-bottom-color:#c8dfc8}
.lbl-html{background:#f0f4ff;color:#1d3a8a;border-bottom-color:#c5d0f0}
.lbl-single{background:#f5f5f3;color:#555}
.compare-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── OVERVIEW TABLE (MD-style) ── */
.sched-table{width:100%;border-collapse:collapse;font-size:12px}
.sched-table th{background:#2c5530;color:#fff;padding:7px 10px;text-align:left;font-size:11px;font-weight:700;white-space:nowrap}
.sched-table th.th-day{width:44px}
.th-mi{font-weight:400;opacity:.75}
.sched-table td{padding:7px 10px;border-bottom:1px solid #f0f0ee;vertical-align:top;line-height:1.35}
.sched-table tr:last-child td{border-bottom:none}
.td-day{font-weight:700;color:#444;white-space:nowrap}
.td-mi{font-size:10px;color:#999;margin-top:1px}
.wk-easy{color:#333}
.wk-quality{color:#1d4ed8;font-weight:600}
.wk-race{color:#92400e;font-weight:700}
.wk-long{color:#166534;font-weight:600}
.wk-rest{color:#bbb;font-style:italic}
.diff-cell{background:#fff7ed !important;outline:2px solid #f59e0b;outline-offset:-2px;border-radius:2px}

/* ── DETAIL VIEW (from week HTML) ── */
.detail-grid{padding:8px}
.detail-day{margin-bottom:10px;border:1px solid #e8e8e6;border-radius:6px;overflow:hidden}
.detail-day-hdr{background:linear-gradient(135deg,#2c5530,#4a7c59);color:#fff;padding:7px 12px;font-size:12px;font-weight:700;letter-spacing:.05em}
.detail-rows{}
.detail-row{display:flex;align-items:flex-start;gap:10px;padding:7px 12px;border-bottom:1px solid #f5f5f3}
.detail-row:last-child{border-bottom:none}
.dr-badge{font-size:10px;font-weight:700;text-transform:uppercase;min-width:46px;padding-top:2px}
.dr-badge.Gold{color:#B8860B}
.dr-badge.Green{color:#2c5530}
.dr-badge.White{color:#555}
.dr-badge.Blue{color:#1E3A8A}
.dr-main{flex:1;min-width:0}
.dr-workout{font-size:12px;line-height:1.4}
.dr-workout.quality{color:#1d4ed8;font-weight:600}
.dr-workout.race{color:#92400e;font-weight:700}
.dr-workout.long{color:#166534;font-weight:600}
.dr-workout.rest-w{color:#bbb;font-style:italic}
.dr-pre,.dr-post{font-size:11px;color:#888;margin-top:2px}
.dr-miles{font-size:11px;font-weight:700;color:#2c5530;white-space:nowrap;padding-top:2px}

/* legend */
.legend{display:flex;align-items:center;gap:14px;padding:7px 16px;font-size:11px;color:#666;background:#fffbf0;border-bottom:1px solid #fde68a;flex-wrap:wrap}
.ldot{display:inline-block;width:11px;height:11px;border-radius:2px;margin-right:3px;vertical-align:middle}
.ldot-diff{background:#fff7ed;outline:2px solid #f59e0b;outline-offset:0}
.ldot-match{background:#f0f0ee;border:1px solid #ddd}

.loading{text-align:center;padding:50px;color:#777;font-size:14px}
.error-box{background:#fff0f0;border:1px solid #fca5a5;border-radius:6px;padding:14px 16px;color:#b91c1c;font-size:12px;margin:12px}
.missing-msg{padding:20px;color:#999;font-size:12px;font-style:italic}
@media(max-width:860px){.compare-wrap{grid-template-columns:1fr}}
</style>
</head>

27 | Champions 2 | Wednesday |\n| 19 | Sep 28\u2013Oct 4 | Trinity Dual Meet | Tuesday |\n| 20 | Oct 5\u201311 | Haunted Woods | Saturday |\n| 22 | Oct 19\u201325 | JV Regional | Thursday |\n\n---\n\n## **TRAINING PHASES**\n\n**\ud83c\udf31 EARLY SUMMER** (Weeks 1\u20133): Easy running + Tuesday quality only; aerobic base re-establishment  \n**\ud83c\udfc3 SUMMER BASE** (Weeks 4\u20137): Blue group joins; alternating Fartlek/Progression on Tuesdays; progressive mileage  \n**\ud83d\udd1d MANDATORY PRACTICE + SUMMER PEAK** (Weeks 8\u201310): Fartlek/Hills shift structure; peak volume builds to 55mi Gold  \n**\u267b\ufe0f RECOVERY** (Week 11): Alumni Run; planned mileage reduction  \n**\ud83d\udcda PRE-SEASON** (Week 12): School schedule adjustment; mileage restored  \n**\ud83d\udc2f XC BUILD** (Week 13): Peak mileage + Tiger Run  \n**\ud83c\udfc1 RACE INTRODUCTION** (Weeks 14\u201315): Varsity time trial; Run for the Gold; volume moderated  \n**\ud83c\udfaf CHAMPIONSHIP PREP** (Weeks 16\u201320): Southern Showcase \u2192 Palatine \u2192 LXC Classic \u2192 Haunted Woods  \n**\ud83d\udcc9 TAPER** (Weeks 21\u201322): Significant volume reduction; optimize freshness  \n**\ud83c\udfc6 STATE** (Week 23): The pinnacle\n\n---\n\n## **PACE GUIDE (ALL GROUPS)**\n\n- **@E:** Easy pace (conversational, 65\u201375% max HR)\n- **@T:** Threshold pace (comfortably hard, 15K\u2013HM race effort, 85\u201390% max HR)\n- **@I:** Interval pace (VO2 max, 3K\u20135K race effort, 95\u2013100% max HR)\n- **@R:** Repetition pace (speed work, mile pace or faster, neuromuscular power)\n- **@RP:** Race pace (current 5K fitness level)\n\n**Fartlek intervals:** \"on\" = controlled surge at roughly 5K\u201310K effort; \"steady\" = comfortable recovery pace (not walking)  \n**Progression runs:** All groups run the same time structure at their own appropriate effort level \u2014 pacing by feel, not by watch\n\n---\n\n## **KEY CHANGES FROM 2025**\n\n| Item | 2025 | 2026 |\n|:-----|:-----|:-----|\n| Freshman group name | Freshman | Blue |\n| Weeks 1\u20137 quality structure | Various | Tuesday only (alternating Fartlek/Progression) |\n| Week 8 Fartlek day | Tuesday | Wednesday |\n| Tiger Run timing | Week 14 | Week 13 |\n| New race: Alumni Run | \u2014 | Week 11 (Saturday) |\n| New race: Run for the Gold | \u2014 | Week 15 (Saturday) |\n| Week 14 Saturday | Tiger Run (race) | Long Run |\n| Week 14 Tuesday | Race-pace workout | Varsity Time Trial / Race |\n| Week 15 Monday | Easy | REST (all groups) |\n| Week 16 | Race week | Long Run week (no race) |\n| Palatine week | 18 (same) | 18 (same) |\n| Weeks 16\u201320 mileage | Per 2025 plan | Updated per 2026 CSV |\n| Race day standardization | 6mi V / 5mi FR | 6mi Gold/Green/White / 5mi Blue |\n";


const WEEK_MIN = 1, WEEK_MAX = 23;
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const DAY_FULL = {Mon:"MONDAY",Tue:"TUESDAY",Wed:"WEDNESDAY",Thu:"THURSDAY",Fri:"FRIDAY",Sat:"SATURDAY",Sun:"SUNDAY"};
const GROUPS = ["Blue","White","Green","Gold"];

let currentWeek = 1;
let mode = "both";       // both | md | html
let detailMode = "overview"; // overview | detail  (for html/published pane)
let mdData = null;
let htmlCache = {};

// ── MD PARSER ────────────────────────────────────────────────────────────────
function parseMD(text) {
  const weeks = {};
  const re = /##\s+\*\*WEEK\s+(\d+):/gi;
  const splits = [];
  let m;
  while ((m = re.exec(text)) !== null) splits.push({idx:m.index, num:+m[1]});
  splits.forEach((s,i) => s.end = i+1<splits.length ? splits[i+1].idx : text.length);
  for (const s of splits) {
    const block = text.slice(s.idx, s.end);
    const lines = block.split('\n');
    const hdr = lines[0];
    const dateM = hdr.match(/WEEK\s+\d+:\s*([^*\u2014\u2013\-]+)/i);
    const phaseM = hdr.match(/[\u2014\u2013]\s*(.+?)(?:\*\*\s*$|\s*$)/);
    const noteM = block.match(/^\*([^*\n]+)\*/m);
    const miles = {}, groups = [];
    const hRow = lines.find(l =>
      l.includes('|') &&
      (l.includes('Gold')||l.includes('Green')||l.includes('White')||l.includes('Blue')) &&
      !l.startsWith('|:-')
    );
    if (hRow) {
      hRow.split('|').slice(1,-1).map(c=>c.trim()).slice(1).forEach(h => {
        const gm = h.match(/^(Blue|White|Green|Gold)\s*\((\d+(?:\.\d+)?)\s*mi\)/i);
        if (gm) { miles[gm[1]]=gm[2]; groups.push(gm[1]); }
      });
    }
    const days = {};
    for (const line of lines) {
      if (!line.startsWith('| **')) continue;
      const cols = line.split('|').slice(1,-1).map(c=>c.trim());
      const dayRaw = cols[0].replace(/\*\*/g,'').trim();
      const day = DAYS.find(d => dayRaw.toLowerCase().startsWith(d.toLowerCase()));
      if (!day) continue;
      days[day] = {};
      groups.forEach((g,i) => {
        const raw = cols[i+1]||'';
        days[day][g] = raw.replace(/\*\*/g,'').replace(/\*(\d[^*]*mi)\*/,'($1)').replace(/\*/g,'').trim();
      });
    }
    weeks[s.num] = {
      date: dateM ? dateM[1].trim() : '',
      phase: phaseM ? phaseM[1].replace(/\*\*/g,'').trim() : '',
      note: noteM ? noteM[1].trim() : '',
      miles, groups, days
    };
  }
  return weeks;
}

// ── HTML PARSER ───────────────────────────────────────────────────────────────
function weekFile(n){ return 'week' + String(n).padStart(2,'0') + '.html'; }
function stripText(el){ return el ? el.textContent.replace(/\s+/g,' ').trim() : ''; }

function parseWeekHTML(htmlText) {
  const doc = new DOMParser().parseFromString(htmlText,'text/html');
  const h1 = doc.querySelector('h1');
  const dateM = h1 ? h1.textContent.match(/Week\s+\d+\s+[\u2014\u2013\-]+\s*(.+)/i) : null;
  const sub = doc.querySelector('.subtitle');
  const miles = {};
  doc.querySelectorAll('.total').forEach(el => {
    const lbl = el.querySelector('.total-label');
    const mi = el.querySelector('.total-miles');
    if (!lbl || !mi) return;
    const g = lbl.textContent.trim();
    const v = mi.textContent.trim();
    if (GROUPS.includes(g) && v && v !== '0') miles[g] = v;
  });
  const days = {};
  const rawRows = {}; // day -> [{group, workout, pre, post, miles}]
  doc.querySelectorAll('.day').forEach(dayEl => {
    const hdr = dayEl.querySelector('.day-header span');
    if (!hdr) return;
    const dayFull = hdr.textContent.trim().toUpperCase();
    const day = DAYS.find(d => DAY_FULL[d] === dayFull);
    if (!day) return;
    days[day] = {};
    rawRows[day] = [];
    dayEl.querySelectorAll('.workout-item').forEach(item => {
      const grp = item.dataset.group;
      if (!grp) return;
      const descSpan = item.querySelector('.workout-desc span:first-child');
      const miEl = item.querySelector('.workout-miles');
      const preEl = item.querySelector('.workout-pre');
      const postEl = item.querySelector('.workout-post');
      const workout = descSpan ? descSpan.textContent.trim() : '';
      const miTxt = miEl ? miEl.textContent.trim() : '';
      days[day][grp] = workout + (!isRest(miTxt) && miTxt ? ' (' + miTxt + ')' : '');
      rawRows[day].push({
        group: grp,
        workout,
        miles: miTxt,
        pre: stripText(preEl),
        post: stripText(postEl)
      });
    });
  });
  return {
    date: dateM ? dateM[1].trim() : '',
    phase: sub ? sub.textContent.replace(/\*/g,'').trim() : '',
    miles, days, rawRows
  };
}

async function loadHTML(n) {
  if (htmlCache[n]) return htmlCache[n];
  const res = await fetch(weekFile(n));
  if (!res.ok) throw new Error('HTTP ' + res.status);
  htmlCache[n] = parseWeekHTML(await res.text());
  return htmlCache[n];
}

// ── CLASSIFY ─────────────────────────────────────────────────────────────────
function isRest(t){ return !t || /^(rest|\*\*rest\*\*)$/i.test(t.trim()); }
function classify(t) {
  if (!t || isRest(t)) return 'rest';
  if (/long run/i.test(t)) return 'long';
  if (/race|championship|classic|invit|dual|regional|state|time trial|tiger run|alumni run|run for the gold|southern showcase|palatine|haunted|lxc/i.test(t)) return 'race';
  if (/fartlek|progression|@[TRI]|hill repeat|hill intro|interval|x\[|x\(|\dx\d|tempo|\d+x\d+|pre.30|pre.40/i.test(t)) return 'quality';
  return 'easy';
}
function wkClass(t){ return {rest:'wk-rest',long:'wk-long',race:'wk-race',quality:'wk-quality',easy:'wk-easy'}[classify(t)]; }
function drClass(t){ return {rest:'rest-w',long:'long',race:'race',quality:'quality',easy:''}[classify(t)]; }

function normDiff(t) {
  return (t||'').toLowerCase().replace(/\s+/g,' ').replace(/[()[\]]/g,' ')
    .replace(/\*+/g,'').replace(/[–—]/g,'-').replace(/\s*mi\s*/g,'mi')
    .replace(/\s+/g,' ').trim();
}
function workoutOnly(t){ return normDiff(t).replace(/\(?\d+\.?\d*mi\)?/g,'').replace(/\s+/g,' ').trim(); }
function cellsDiffer(a,b){ return workoutOnly(a) !== workoutOnly(b); }
function countDiffs(md,html) {
  if (!md||!html) return -1;
  let n=0;
  for (const day of DAYS) {
    const mdd=md.days[day]||{}, hd=html.days[day]||{};
    for (const g of (md.groups||GROUPS)) {
      if (hd[g]!==undefined && cellsDiffer(mdd[g]||'', hd[g]||'')) n++;
    }
  }
  return n;
}

// ── RENDER: OVERVIEW TABLE ───────────────────────────────────────────────────
function renderOverview(weekData, otherData, showDiff) {
  if (!weekData) return '<div class="missing-msg">No data.</div>';
  const groups = weekData.groups && weekData.groups.length
    ? weekData.groups
    : GROUPS.filter(g => weekData.miles && weekData.miles[g]);
  if (!groups.length) return '<div class="missing-msg">Could not parse group data.</div>';

  let h = '<table class="sched-table"><thead><tr><th class="th-day">Day</th>';
  groups.forEach(g => {
    const mi = weekData.miles[g];
    h += '<th>' + g + (mi ? ' <span class="th-mi">(' + mi + ' mi)</span>' : '') + '</th>';
  });
  h += '</tr></thead><tbody>';
  for (const day of DAYS) {
    const dd = weekData.days[day];
    if (!dd) continue;
    h += '<tr><td class="td-day">' + day + '</td>';
    groups.forEach(g => {
      const val = dd[g]||'';
      const txt = isRest(val) ? 'Rest' : val;
      let diffCls = '';
      if (showDiff && otherData && otherData.days[day]) {
        if (cellsDiffer(val, otherData.days[day][g]||'')) diffCls = ' diff-cell';
      }
      h += '<td class="' + diffCls + '"><span class="' + wkClass(val) + '">' + txt + '</span></td>';
    });
    h += '</tr>';
  }
  return h + '</tbody></table>';
}

// ── RENDER: DETAIL (from HTML raw rows) ─────────────────────────────────────
function renderDetail(htmlData) {
  if (!htmlData || !htmlData.rawRows) return '<div class="missing-msg">Detail data not available.</div>';
  let h = '<div class="detail-grid">';
  for (const day of DAYS) {
    const rows = htmlData.rawRows[day];
    if (!rows || !rows.length) continue;
    h += '<div class="detail-day"><div class="detail-day-hdr">' + DAY_FULL[day] + '</div><div class="detail-rows">';
    rows.forEach(r => {
      const cls = drClass(r.workout);
      const wTxt = isRest(r.workout) ? 'Rest' : r.workout;
      const miTxt = r.miles && !isRest(r.miles) ? r.miles : '';
      h += '<div class="detail-row">';
      h += '<div class="dr-badge ' + r.group + '">' + r.group + '</div>';
      h += '<div class="dr-main">';
      h += '<div class="dr-workout ' + cls + '">' + wTxt + '</div>';
      if (r.pre) h += '<div class="dr-pre">Before: ' + r.pre + '</div>';
      if (r.post) h += '<div class="dr-post">After: ' + r.post + '</div>';
      h += '</div>';
      if (miTxt) h += '<div class="dr-miles">' + miTxt + '</div>';
      h += '</div>';
    });
    h += '</div></div>';
  }
  return h + '</div>';
}

// ── RENDER: HTML PANE (overview or detail depending on detailMode) ───────────
function renderHTMLPane(htmlData, mdData, showDiff) {
  if (!htmlData) return '<div class="error-box"><strong>' + weekFile(currentWeek) + '</strong> not found.<br>Place this viewer in the same folder as your week HTML files.</div>';
  if (detailMode === 'detail') return renderDetail(htmlData);
  return renderOverview(htmlData, mdData, showDiff);
}

// ── WEEK BAR ─────────────────────────────────────────────────────────────────
function updateBar(md, html) {
  const d = md||html;
  if (!d) { document.getElementById('wkbar').style.display='none'; return; }
  document.getElementById('wbTitle').textContent = 'Week ' + currentWeek + (d.date ? ' — ' + d.date : '');
  const ph = document.getElementById('wbPhase');
  ph.textContent = d.phase||''; ph.style.display = d.phase ? '' : 'none';
  const no = document.getElementById('wbNote');
  no.textContent = (md&&md.note)||''; no.style.display = (md&&md.note) ? '' : 'none';
  const src = md||html;
  const groups = (md&&md.groups||[]).length ? md.groups : GROUPS.filter(g=>src.miles&&src.miles[g]);
  document.getElementById('wbMiles').innerHTML = groups.map(g =>
    src.miles[g] ? '<span class="mbadge mb-' + g + '">' + g + ': ' + src.miles[g] + ' mi</span>' : ''
  ).join('');
  document.getElementById('wkbar').style.display = '';
}

// ── MAIN RENDER ──────────────────────────────────────────────────────────────
function renderWeek(mdW, htmlW) {
  const main = document.getElementById('main');
  const legend = document.getElementById('legend');
  const subbar = document.getElementById('subbar');

  // subbar visibility: show when html pane is visible
  subbar.style.display = (mode === 'html' || mode === 'both') ? '' : 'none';

  if (mode === 'md') {
    legend.style.display = 'none';
    main.innerHTML = '<div class="pane"><div class="pane-label lbl-single">Plan — MD file</div>' + renderOverview(mdW,null,false) + '</div>';
    return;
  }

  if (mode === 'html') {
    legend.style.display = 'none';
    main.innerHTML = '<div class="pane"><div class="pane-label lbl-single">Published — ' + weekFile(currentWeek) + '</div>' + renderHTMLPane(htmlW,null,false) + '</div>';
    return;
  }

  // compare mode
  const diffs = countDiffs(mdW, htmlW);
  legend.style.display = '';
  const dc = document.getElementById('diffCount');
  if (diffs < 0) { dc.textContent = 'Published not loaded'; dc.style.color='#888'; }
  else if (diffs === 0) { dc.textContent = '✓ All cells match'; dc.style.color='#15803d'; }
  else { dc.textContent = diffs + ' cell' + (diffs===1?'':'s') + ' differ'; dc.style.color='#b45309'; }

  main.innerHTML =
    '<div class="compare-wrap">' +
    '<div class="pane"><div class="pane-label lbl-md">📋 Plan — MD file</div>' + renderOverview(mdW, htmlW, true) + '</div>' +
    '<div class="pane"><div class="pane-label lbl-html">🌐 Published — ' + weekFile(currentWeek) + '</div>' + renderHTMLPane(htmlW, mdW, true) + '</div>' +
    '</div>';
}

// ── NAVIGATION & MODE ────────────────────────────────────────────────────────
async function setWeek(n) {
  currentWeek = Math.max(WEEK_MIN, Math.min(WEEK_MAX, n));
  document.getElementById('wkSel').value = currentWeek;
  document.getElementById('wkLabel').textContent = 'Wk ' + currentWeek;
  document.getElementById('prevBtn').disabled = currentWeek <= WEEK_MIN;
  document.getElementById('nextBtn').disabled = currentWeek >= WEEK_MAX;
  document.getElementById('main').innerHTML = '<div class="loading">Loading week ' + currentWeek + '…</div>';
  document.getElementById('wkbar').style.display = 'none';
  document.getElementById('legend').style.display = 'none';
  document.getElementById('hstatus').textContent = '';

  const mdW = mdData[currentWeek] || null;
  let htmlW = null;
  if (mode !== 'md') {
    try {
      htmlW = await loadHTML(currentWeek);
      document.getElementById('hstatus').textContent = weekFile(currentWeek) + ' ✓';
    } catch(e) {
      document.getElementById('hstatus').textContent = weekFile(currentWeek) + ' — not found';
    }
  }
  updateBar(mdW, htmlW);
  renderWeek(mdW, htmlW);
}

function changeWeek(d){ setWeek(currentWeek+d); }

function setMode(m) {
  mode = m;
  ['Both','MD','HTML'].forEach(x =>
    document.getElementById('btn'+x).classList.toggle('on', x.toLowerCase()===m)
  );
  setWeek(currentWeek);
}

function setDetail(d) {
  detailMode = d;
  document.getElementById('btnOvr').classList.toggle('on', d==='overview');
  document.getElementById('btnDet').classList.toggle('on', d==='detail');
  // re-render without re-fetching
  const mdW = mdData[currentWeek]||null;
  const htmlW = htmlCache[currentWeek]||null;
  renderWeek(mdW, htmlW);
}

function buildSelect() {
  const sel = document.getElementById('wkSel');
  sel.innerHTML = '';
  for (let i=WEEK_MIN; i<=WEEK_MAX; i++) {
    const o = document.createElement('option');
    o.value=i; o.textContent='Week '+i; sel.appendChild(o);
  }
  sel.value = currentWeek;
}

mdData = parseMD(MD_TEXT);
buildSelect();
setWeek(currentWeek);
</script>
</body>
</html>
