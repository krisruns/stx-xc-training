327 | Champions 2 | Wednesday |\n| 19 | Sep 28\u2013Oct 4 | Trinity Dual Meet | Tuesday |\n| 20 | Oct 5\u201311 | Haunted Woods | Saturday |\n| 22 | Oct 19\u201325 | JV Regional | Thursday |\n\n---\n\n## **TRAINING PHASES**\n\n**\ud83c\udf31 EARLY SUMMER** (Weeks 1\u20133): Easy running + Tuesday quality only; aerobic base re-establishment  \n**\ud83c\udfc3 SUMMER BASE** (Weeks 4\u20137): Blue group joins; alternating Fartlek/Progression on Tuesdays; progressive mileage  \n**\ud83d\udd1d MANDATORY PRACTICE + SUMMER PEAK** (Weeks 8\u201310): Fartlek/Hills shift structure; peak volume builds to 55mi Gold  \n**\u267b\ufe0f RECOVERY** (Week 11): Alumni Run; planned mileage reduction  \n**\ud83d\udcda PRE-SEASON** (Week 12): School schedule adjustment; mileage restored  \n**\ud83d\udc2f XC BUILD** (Week 13): Peak mileage + Tiger Run  \n**\ud83c\udfc1 RACE INTRODUCTION** (Weeks 14\u201315): Varsity time trial; Run for the Gold; volume moderated  \n**\ud83c\udfaf CHAMPIONSHIP PREP** (Weeks 16\u201320): Southern Showcase \u2192 Palatine \u2192 LXC Classic \u2192 Haunted Woods  \n**\ud83d\udcc9 TAPER** (Weeks 21\u201322): Significant volume reduction; optimize freshness  \n**\ud83c\udfc6 STATE** (Week 23): The pinnacle\n\n---\n\n## **PACE GUIDE (ALL GROUPS)**\n\n- **@E:** Easy pace (conversational, 65\u201375% max HR)\n- **@T:** Threshold pace (comfortably hard, 15K\u2013HM race effort, 85\u201390% max HR)\n- **@I:** Interval pace (VO2 max, 3K\u20135K race effort, 95\u2013100% max HR)\n- **@R:** Repetition pace (speed work, mile pace or faster, neuromuscular power)\n- **@RP:** Race pace (current 5K fitness level)\n\n**Fartlek intervals:** \"on\" = controlled surge at roughly 5K\u201310K effort; \"steady\" = comfortable recovery pace (not walking)  \n**Progression runs:** All groups run the same time structure at their own appropriate effort level \u2014 pacing by feel, not by watch\n\n---\n\n## **KEY CHANGES FROM 2025**\n\n| Item | 2025 | 2026 |\n|:-----|:-----|:-----|\n| Freshman group name | Freshman | Blue |\n| Weeks 1\u20137 quality structure | Various | Tuesday only (alternating Fartlek/Progression) |\n| Week 8 Fartlek day | Tuesday | Wednesday |\n| Tiger Run timing | Week 14 | Week 13 |\n| New race: Alumni Run | \u2014 | Week 11 (Saturday) |\n| New race: Run for the Gold | \u2014 | Week 15 (Saturday) |\n| Week 14 Saturday | Tiger Run (race) | Long Run |\n| Week 14 Tuesday | Race-pace workout | Varsity Time Trial / Race |\n| Week 15 Monday | Easy | REST (all groups) |\n| Week 16 | Race week | Long Run week (no race) |\n| Palatine week | 18 (same) | 18 (same) |\n| Weeks 16\u201320 mileage | Per 2025 plan | Updated per 2026 CSV |\n| Race day standardization | 6mi V / 5mi FR | 6mi Gold/Green/White / 5mi Blue |\n";

const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const GROUPS = ["Blue","White","Green","Gold"];
const BADGE = {Blue:"mb-blue",White:"mb-white",Green:"mb-green",Gold:"mb-gold"};

let ghParsed = null;
let localParsed = parseSchedule(LOCAL_MD);
let currentWeek = 1;
let maxWeek = 23;
let source = "github";

function parseSchedule(text) {
  const weeks = {};
  const re = /##\s+\*\*WEEK\s+(\d+)[:\u003a]/gi;
  const pts = [];
  let m;
  while ((m = re.exec(text)) !== null) pts.push({idx:m.index, num:+m[1]});
  pts.forEach((p,i) => p.end = i+1 < pts.length ? pts[i+1].idx : text.length);
  
  for (const p of pts) {
    const block = text.slice(p.idx, p.end);
    const lines = block.split("\n");
    const h = lines[0];
    const dateM = h.match(/WEEK\s+\d+:\s*([^*\u2014\u2013\-]+)/i);
    const phaseM = h.match(/[\u2014\u2013\-]\s*(.+?)(?:\*\*|$)/);
    const noteM = block.match(/^\*([^*\n]+)\*/m);
    const miles = {};
    const days = {};
    
    // parse header row for mileage
    const headerRow = lines.find(l => l.includes("| Day |") || (l.includes("|") && (l.includes("Gold") || l.includes("Blue") || l.includes("Green") || l.includes("White")) && !l.startsWith("|:-")));
    if (headerRow) {
      headerRow.split("|").slice(1,-1).forEach(cell => {
        const mm = cell.match(/([A-Za-z]+)\s*\((\d+(?:\.\d+)?)\s*mi\)/i);
        if (mm) miles[mm[1]] = parseFloat(mm[2]);
      });
    }
    
    // parse day rows
    const tableLines = lines.filter(l => l.trim().startsWith("|"));
    let headers = [];
    for (const line of tableLines) {
      const cols = line.split("|").slice(1,-1).map(c => c.trim());
      if (!cols.length) continue;
      if (cols[0].toLowerCase() === "day") { headers = cols.slice(1).map(h => h.replace(/\s*\(.*?\)/,"").trim()); continue; }
      if (cols[0].startsWith(":-")) continue;
      const d = DAYS.find(d => cols[0].replace(/\*/g,"").trim().startsWith(d));
      if (!d) continue;
      days[d] = {};
      headers.forEach((g,i) => { days[d][g] = (cols[i+1]||"").replace(/\*\*/g,"").trim(); });
    }
    
    weeks[p.num] = {
      date: dateM ? dateM[1].trim() : "",
      phase: phaseM ? phaseM[1].replace(/\*\*/g,"").trim() : "",
      note: noteM ? noteM[1].trim() : "",
      miles, days
    };
  }
  return weeks;
}

function isQuality(t){return t&&/(@T|@R|@I|fartlek|progression|hill|time trial|interval|repeats|x\(|x\d)/i.test(t);}
function isRace(t){return t&&/race|championship|classic|invit|dual|regional|state/i.test(t);}
function isRest(t){return !t||/^(rest|\*\*rest\*\*)$/i.test(t.trim());}
function clean(t){return (t||"").replace(/\*/g,"").trim();}

function renderTable(wd) {
  if (!wd || !wd.days || !Object.keys(wd.days).length) return "<div style='padding:20px;color:#888;font-size:13px'>No schedule data parsed.</div>";
  const groups = GROUPS.filter(g => Object.values(wd.days).some(d => d[g] !== undefined && d[g] !== ""));
  let h = `<table class="day-table"><thead><tr><th class="col-head-day">Day</th>${groups.map(g=>`<th>${g}</th>`).join("")}</tr></thead><tbody>`;
  for (const day of DAYS) {
    const dd = wd.days[day];
    if (!dd) continue;
    h += `<tr><td class="day-col">${day}</td>`;
    groups.forEach(g => {
      const raw = dd[g] || "";
      const txt = clean(raw);
      let cell = txt || "—";
      if (isRest(raw)) cell = `<span class="cell-rest">Rest</span>`;
      else if (isRace(raw)) cell = `<span class="cell-race">${txt}</span>`;
      else if (isQuality(raw)) cell = `<span class="cell-quality">${txt}</span>`;
      h += `<td>${cell}</td>`;
    });
    h += "</tr>";
  }
  return h + "</tbody></table>";
}

function renderPanel(wd, label) {
  if (!wd) return `<div class="source-label">${label}</div><div style="padding:20px;color:#888;font-size:13px">No data available.</div>`;
  let h = "";
  if (label) h += `<div class="source-label">${label}</div>`;
  h += `<div class="week-header">`;
  h += `<div class="week-title">Week ${currentWeek}${wd.date ? " &mdash; " + wd.date : ""}</div>`;
  if (wd.phase) h += `<div><span class="week-phase">${wd.phase}</span></div>`;
  if (wd.note) h += `<div class="week-note">${wd.note}</div>`;
  h += `</div>`;
  if (wd.miles && Object.keys(wd.miles).length) {
    h += `<div class="miles-row">`;
    Object.entries(wd.miles).forEach(([g,mi]) => h += `<span class="mbadge ${BADGE[g]||"mb-white"}">${g}: ${mi}mi</span>`);
    h += `</div>`;
  }
  h += `<div class="week-content">${renderTable(wd)}</div>`;
  return h;
}

function diffRows(wd1, wd2) {
  // returns set of days where content differs
  const diffs = new Set();
  if (!wd1 || !wd2) return diffs;
  for (const d of DAYS) {
    const d1 = wd1.days[d] || {};
    const d2 = wd2.days[d] || {};
    const keys = new Set([...Object.keys(d1), ...Object.keys(d2)]);
    for (const k of keys) {
      if (clean(d1[k] || "") !== clean(d2[k] || "")) { diffs.add(d); break; }
    }
  }
  return diffs;
}

function render() {
  const gh = ghParsed && ghParsed[currentWeek];
  const loc = localParsed && localParsed[currentWeek];
  const main = document.getElementById("main");
  
  let html = `<div class="week-card">`;
  
  if (source === "github") {
    html += renderPanel(gh, null);
  } else if (source === "local") {
    html += renderPanel(loc, null);
  } else {
    // compare side by side, highlight diffs
    const diffs = diffRows(gh, loc);
    html += `<div class="compare-grid">`;
    html += `<div class="compare-pane">${renderPanel(gh, "GitHub &mdash; live")}</div>`;
    html += `<div class="compare-pane">${renderPanel(loc, "Project file &mdash; saved")}</div>`;
    html += `</div>`;
    if (diffs.size) html += `<div style="padding:8px 16px;font-size:11px;color:#92400e;background:#fef9c3;border-top:1px solid #fde68a">Differences detected on: ${[...diffs].join(", ")}</div>`;
    else if (gh && loc) html += `<div style="padding:8px 16px;font-size:11px;color:#15803d;background:#f0fdf4;border-top:1px solid #bbf7d0">&#10003; Both versions match for this week</div>`;
  }
  
  html += `</div>`;
  main.innerHTML = html;
}

async function refreshGH() {
  const dot = document.getElementById("statusDot");
  dot.className = "status-dot loading";
  document.getElementById("refreshBtn").textContent = "Loading…";
  try {
    const res = await fetch(GH_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    ghParsed = parseSchedule(text);
    maxWeek = Math.max(...Object.keys(ghParsed).map(Number));
    buildSelect();
    dot.className = "status-dot";
    document.getElementById("statusDot").title = "GitHub loaded ✓";
  } catch(e) {
    dot.className = "status-dot";
    dot.style.background = "#ef4444";
    document.getElementById("statusDot").title = "GitHub fetch failed: " + e.message;
    alert("Could not fetch from GitHub: " + e.message + "\n\nURL: " + GH_URL);
  }
  document.getElementById("refreshBtn").textContent = "↺ Refresh";
  render();
}

function buildSelect() {
  const sel = document.getElementById("weekSel");
  sel.innerHTML = "";
  for (let i=1;i<=maxWeek;i++) {
    const o = document.createElement("option");
    o.value = i; o.textContent = "Week " + i;
    sel.appendChild(o);
  }
  sel.value = currentWeek;
}

function changeWeek(d) { setWeek(currentWeek + d); }
function setWeek(n) {
  currentWeek = Math.max(1, Math.min(maxWeek, n));
  document.getElementById("weekSel").value = currentWeek;
  document.getElementById("navLabel").textContent = "Week " + currentWeek;
  document.getElementById("prevBtn").disabled = currentWeek <= 1;
  document.getElementById("nextBtn").disabled = currentWeek >= maxWeek;
  render();
}
function setSource(s) {
  source = s;
  ["github","local","both"].forEach(x => document.getElementById("btn"+x.charAt(0).toUpperCase()+x.slice(1)).classList.remove("active"));
  const ids = {github:"btnGH",local:"btnLocal",both:"btnBoth"};
  document.getElementById(ids[s]).classList.add("active");
  render();
}

// init
localParsed = parseSchedule(LOCAL_MD);
maxWeek = Math.max(...Object.keys(localParsed).map(Number), 23);
buildSelect();
render();
refreshGH();
</script>
